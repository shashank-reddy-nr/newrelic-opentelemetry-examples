plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.newrelic.example'
version = '1.0.0'

java { sourceCompatibility = JavaVersion.VERSION_21 }

repositories { mavenCentral() }

dependencies {
    // Only kafka-clients needed — OTel instrumentation is via javaagent, zero code change
    implementation 'org.apache.kafka:kafka-clients:3.8.1'
}

shadowJar {
    archiveFileName = 'app.jar'
    manifest { attributes 'Main-Class': 'kafka.ProducerApp' }
}
